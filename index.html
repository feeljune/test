<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>댓글 기능</title>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    body {
      font-family: sans-serif;
      max-width: 700px;
      margin: 40px auto;
      padding: 20px;
    }

    h2, h3 {
      margin-bottom: 15px;
    }

    input, textarea, button {
      width: 100%;
      padding: 12px;
      margin-top: 10px;
      font-size: 16px;
      box-sizing: border-box;
    }

    button {
      cursor: pointer;
    }

    .comment {
      border-bottom: 1px solid #ddd;
      padding: 15px 0;
    }

    .nickname {
      font-weight: bold;
      margin-bottom: 5px;
    }

    .date {
      font-size: 12px;
      color: #999;
      margin-top: 5px;
    }
  </style>
</head>
<body>

<h2>댓글 남기기</h2>

<input id="nickname" placeholder="닉네임 입력">
<textarea id="content" rows="4" placeholder="댓글 입력"></textarea>
<button onclick="saveComment()">등록</button>

<h3>댓글 목록</h3>
<div id="comments"></div>

<script>
const supabaseUrl = 'https://svigabjvhajdnotzpbhl.supabase.co';

const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InN2aWdhYmp2aGFqZG5vdHpwYmhsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQzNDk2NjcsImV4cCI6MjA4OTkyNTY2N30.dpPNTZCYcgu3VmcWweBHEYV-XlH4AGDSUB7ajrEFk64';

const client = supabase.createClient(supabaseUrl, supabaseKey);

async function saveComment() {
  const nickname = document.getElementById('nickname').value.trim();
  const content = document.getElementById('content').value.trim();

  if (!nickname || !content) {
    alert('닉네임과 댓글을 입력하세요.');
    return;
  }

  const { error } = await client
    .from('comments')
    .insert([{ nickname, content }]);

  if (error) {
    console.error(error);
    alert('저장 실패');
    return;
  }

  document.getElementById('content').value = '';
  loadComments();
}

async function loadComments() {
  const { data, error } = await client
    .from('comments')
    .select('*')
    .order('created_at', { ascending: false });

  if (error) {
    console.error(error);
    return;
  }

  const container = document.getElementById('comments');
  container.innerHTML = '';

  data.forEach(comment => {
    const div = document.createElement('div');
    div.className = 'comment';

    div.innerHTML = `
      <div class="nickname">${escapeHtml(comment.nickname)}</div>
      <div>${escapeHtml(comment.content)}</div>
      <div class="date">${new Date(comment.created_at).toLocaleString()}</div>
    `;

    container.appendChild(div);
  });
}

function escapeHtml(text) {
  const div = document.createElement('div');
  div.innerText = text;
  return div.innerHTML;
}

loadComments();
</script>

</body>
</html>
